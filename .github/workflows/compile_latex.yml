name: Run Experiments, Compile LaTeX, and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_everything:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Installs nbconvert to execute notebooks + your custom packages
          pip install nbconvert
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Notebook and Generate Figures
        run: |
          # Executes the notebook. Change path if it's inside a subfolder
          jupyter nbconvert --to notebook --execute experiments.ipynb --inplace

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: raport
          compiler: pdflatex 
          args: "-pdf -bibtex -interaction=nonstopmode -file-line-error"

      - name: Move PDF to deployment directory
        run: |
          mkdir public
          mv raport/main.pdf public/index.pdf 

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public/'

  deploy_pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}index.pdf
    runs-on: ubuntu-latest
    needs: build_everything
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4